<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#05010f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' blob:; manifest-src 'self'; worker-src 'self' blob:; base-uri 'none'; form-action 'none'">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Portail</title>
<style>
  :root { --accent:#7f5cff; --accent2:#22d3ee; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:#05010f; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }

  /* Fond : caméra réelle (AR) ou dégradé sombre en repli */
  #cam { position:fixed; inset:0; width:100%; height:100%; object-fit:cover;
    z-index:0; display:none; background:#05010f; }
  body.has-cam #cam { display:block; }
  body:not(.has-cam)::before { content:""; position:fixed; inset:0; z-index:0;
    background:radial-gradient(130% 130% at 50% 30%, #1a0b3a 0%, #05010f 60%); }

  #scene { position:fixed; inset:0; display:block; z-index:1; touch-action:none; }

  .hud { position:fixed; inset:0; pointer-events:none; z-index:5; }
  .hud .top { position:absolute; top:calc(env(safe-area-inset-top) + 18px); left:0; right:0;
    text-align:center; opacity:0; transition:opacity 1s ease; }
  .hud .top.show { opacity:1; }
  .title { font-size:12px; letter-spacing:.42em; text-transform:uppercase;
    color:rgba(255,255,255,.7); font-weight:600; padding-left:.42em;
    text-shadow:0 2px 12px rgba(0,0,0,.8); }
  .subtitle { margin-top:6px; font-size:11px; letter-spacing:.12em; color:var(--accent2);
    text-shadow:0 2px 12px rgba(0,0,0,.9); }

  .hint { position:absolute; bottom:calc(env(safe-area-inset-bottom) + 30px); left:0; right:0;
    text-align:center; font-size:13px; letter-spacing:.04em; color:rgba(255,255,255,.85);
    text-shadow:0 2px 12px rgba(0,0,0,.9); opacity:0; transition:opacity 1s ease; }
  .hint.show { opacity:1; }
  .hint span { color:var(--accent2); }

  #start { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:32px;
    background:radial-gradient(120% 120% at 50% 0%, #14082e 0%, #05010f 60%);
    transition:opacity .8s ease; }
  #start.hidden { opacity:0; pointer-events:none; }
  .logo { width:140px; height:140px; margin-bottom:34px; position:relative; }
  .logo .ring { position:absolute; inset:0; border-radius:50%; border:1px solid rgba(127,92,255,.35); }
  .logo .ring.r2 { inset:16px; border-color:rgba(34,211,238,.35); animation:spin 9s linear infinite reverse; }
  .logo .ring.r1 { animation:spin 14s linear infinite; }
  .logo .core { position:absolute; inset:40px; border-radius:50%;
    background:conic-gradient(from 0deg, #22d3ee, #7f5cff, #ff5ca8, #7f5cff, #22d3ee);
    filter:blur(2px); animation:spin 6s linear infinite;
    box-shadow:0 0 50px 8px rgba(127,92,255,.7), inset 0 0 24px rgba(255,255,255,.5); }
  .logo .hole { position:absolute; inset:64px; border-radius:50%;
    background:radial-gradient(circle, #fff, #b79bff 60%, #05010f 130%);
    animation:pulse 3.4s ease-in-out infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes pulse { 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.12);} }
  #start h1 { font-size:32px; font-weight:700; letter-spacing:.01em;
    background:linear-gradient(120deg,#fff,#b79bff 55%,#22d3ee);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  #start p { margin-top:14px; max-width:310px; font-size:14px; line-height:1.55; color:rgba(255,255,255,.62); }
  .btn { margin-top:38px; pointer-events:auto; cursor:pointer; border:none;
    padding:17px 42px; border-radius:40px; font-size:15px; font-weight:700; letter-spacing:.03em;
    color:#fff; background:linear-gradient(120deg,var(--accent),var(--accent2));
    box-shadow:0 10px 34px -8px rgba(127,92,255,.85); transition:transform .2s ease, box-shadow .2s ease; }
  .btn:active { transform:scale(.96); }
  .note { margin-top:22px; font-size:11px; color:rgba(255,255,255,.34); max-width:280px; line-height:1.5; }
  #fps { position:fixed; top:6px; left:8px; z-index:30; font-size:10px;
    color:rgba(255,255,255,.5); font-variant-numeric:tabular-nums; display:none;
    text-shadow:0 1px 4px #000; }
  .fade-in { animation:fade 1.2s ease forwards; }
  @keyframes fade { from{opacity:0;} to{opacity:1;} }
</style>
</head>
<body>
  <video id="cam" playsinline autoplay muted></video>
  <canvas id="scene"></canvas>

  <div class="hud">
    <div class="top" id="hudTop">
      <div class="title">Portail</div>
      <div class="subtitle" id="statusLine">Chargement…</div>
    </div>
    <div class="hint" id="hint">Regarde <span>tout autour de toi</span> 👀</div>
  </div>

  <div id="fps">--</div>

  <div id="start">
    <div class="logo">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="core"></div>
      <div class="hole"></div>
    </div>
    <h1>Portail</h1>
    <p>Active ta caméra et regarde autour de toi. Quelque chose d'énorme s'est invité dans la pièce…</p>
    <button class="btn" id="enterBtn">Lancer</button>
    <div class="note" id="startNote">L'app utilise ta caméra et les capteurs de mouvement. Rien n'est enregistré ni envoyé, tout reste sur ton téléphone.</div>
  </div>

  <script src="vendor/three.min.js"></script>
  <script src="vendor/GLTFLoader.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
